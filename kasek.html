<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrasi Utama Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-xs p-4">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg border border-gray-300">
        
        <div class="bg-gray-800 text-white p-4 rounded-t-xl flex justify-between items-center">
            <div>
                <h1 class="text-sm font-bold uppercase tracking-wider">👑 Input Profil Kasek & Komite Sekolah</h1>
                <p class="text-[10px] text-gray-300">Pengisian Data Puncak Papan Struktur</p>
            </div>
            <a href="index.html" class="bg-red-600 hover:bg-red-700 text-white font-bold px-3 py-1.5 rounded transition shadow text-[10px]">
                ⬅️ Kembali
            </a>
        </div>

        <form id="form-kasek" class="p-4 space-y-4">
            
            <div class="bg-gray-50 p-3 rounded border">
                <label class="block font-bold text-gray-700 mb-1 uppercase text-[10px]">🏫 Nama Resmi Satuan Pendidikan</label>
                <input type="text" id="ins-nama-sekolah" required placeholder="Contoh: SDN 1 CIHERANG" class="w-full p-2 border rounded text-xs bg-white">
            </div>

            <div class="bg-yellow-50 p-3 rounded border border-yellow-300 space-y-3">
                <span class="text-[10px] font-bold text-yellow-800 uppercase block">🏆 Data Kepala Sekolah</span>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    <div>
                        <label class="block text-gray-600 mb-0.5">Nama & Gelar</label>
                        <input type="text" id="ins-nama-kasek" required placeholder="Contoh: Drs. Mulyadi, M.Pd." class="w-full p-2 border rounded text-xs bg-white">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-0.5">NIP Kasek</label>
                        <input type="text" id="ins-nip-kasek" required placeholder="Contoh: 19740511..." class="w-full p-2 border rounded text-xs bg-white">
                    </div>
                </div>
                <div>
                    <label class="block text-amber-900 font-bold mb-0.5">📸 Unggah Pas Foto Kepala Sekolah</label>
                    <input type="file" id="file-foto-kasek" accept="image/*" class="w-full text-xs">
                </div>
            </div>

            <div class="bg-amber-50 p-3 rounded border border-amber-300 space-y-3">
                <span class="text-[10px] font-bold text-amber-800 uppercase block">🤝 Data Ketua Komite</span>
                <div>
                    <label class="block text-gray-600 mb-0.5">Nama Lengkap Ketua Komite</label>
                    <input type="text" id="ins-nama-komite" required placeholder="Contoh: Haji Kurdi" class="w-full p-2 border rounded text-xs bg-white">
                </div>
                <div>
                    <label class="block text-amber-900 font-bold mb-0.5">📸 Unggah Pas Foto Ketua Komite</label>
                    <input type="file" id="file-foto-komite" accept="image/*" class="w-full text-xs">
                </div>
            </div>

            <div class="bg-sky-50 p-3 rounded border border-sky-300 grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div class="sm:col-span-2">
                    <span class="text-[10px] font-bold text-sky-800 uppercase block">💼 Staff Administrasi & Kesiswaan</span>
                </div>
                <div>
                    <label class="block text-gray-600 mb-0.5">Nama Kepala TU</label>
                    <input type="text" id="ins-nama-tu" required placeholder="Isi '-' jika tidak ada" class="w-full p-2 border rounded text-xs bg-white">
                </div>
                <div>
                    <label class="block text-gray-600 mb-0.5">Nama Guru BK / Kesiswaan</label>
                    <input type="text" id="ins-nama-bk" required placeholder="Isi '-' jika tidak ada" class="w-full p-2 border rounded text-xs bg-white">
                </div>
            </div>

            <button type="submit" id="btn-save-kasek" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded text-xs transition shadow-md">
                💾 Simpan & Update Papan Struktur
            </button>

        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCCfF6fGPrZWMOVcVUIDzzcLC4dFEl9LBY",
          authDomain: "sekolah-4e62f.firebaseapp.com",
          projectId: "sekolah-4e62f",
          storageBucket: "sekolah-4e62f.firebasestorage.app",
          messagingSenderId: "1018984142264",
          appId: "1:1018984142264:web:e34fe5fd50766a6100ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fungsi mengubah gambar menjadi teks agar hemat penyimpanan database
        function kompresMedia(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 140;
                        canvas.height = 180;
                        ctx.drawImage(img, 0, 0, 140, 180);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // Mengambil data lama agar form terisi otomatis
        async function muatData() {
            try {
                const docSnap = await getDoc(doc(db, "profil_sekolah", "identitas"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("ins-nama-sekolah").value = data.nama_sekolah || "";
                    document.getElementById("ins-nama-komite").value = data.nama_komite || "";
                    document.getElementById("ins-nama-kasek").value = data.nama_kasek || "";
                    document.getElementById("ins-nip-kasek").value = data.nip_kasek || "";
                    document.getElementById("ins-nama-tu").value = data.nama_tu || "";
                    document.getElementById("ins-nama-bk").value = data.nama_bk || "";
                }
            } catch (e) { console.error(e); }
        }

        // Proses Klik Simpan
        document.getElementById("form-kasek").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-save-kasek");
            btn.innerText = "⏳ Sedang Menyimpan Data...";
            btn.disabled = true;

            try {
                const fileKasek = document.getElementById("file-foto-kasek").files[0];
                const fileKomite = document.getElementById("file-foto-komite").files[0];
                
                let stringKasek = "";
                let stringKomite = "";

                const docSnap = await getDoc(doc(db, "profil_sekolah", "identitas"));
                if (docSnap.exists()) {
                    stringKasek = docSnap.data().foto_kasek || "";
                    stringKomite = docSnap.data().foto_komite || "";
                }

                if (fileKasek) stringKasek = await kompresMedia(fileKasek);
                if (fileKomite) stringKomite = await kompresMedia(fileKomite);

                await setDoc(doc(db, "profil_sekolah", "identitas"), {
                    nama_sekolah: document.getElementById("ins-nama-sekolah").value.toUpperCase(),
                    nama_komite: document.getElementById("ins-nama-komite").value,
                    nama_kasek: document.getElementById("ins-nama-kasek").value,
                    nip_kasek: document.getElementById("ins-nip-kasek").value,
                    nama_tu: document.getElementById("ins-nama-tu").value,
                    nama_bk: document.getElementById("ins-nama-bk").value,
                    foto_kasek: stringKasek,
                    foto_komite: stringKomite
                });

                alert("🎉 Sukses! Data Pimpinan & Komite Berhasil Diperbarui!");
            } catch (err) {
                alert("Gagal menyimpan: " + err.message);
            } finally {
                btn.innerText = "💾 Simpan & Update Papan Struktur";
                btn.disabled = false;
            }
        });

        window.onload = muatData;
    </script>
</body>
</html>
