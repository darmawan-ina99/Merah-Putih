<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kepala Sekolah & Komite Profil Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-xs">

    <header class="bg-gray-800 text-white shadow-md p-4 flex justify-between items-center border-b-4 border-red-600">
        <div>
            <h1 class="text-base font-bold uppercase tracking-wider">👑 Panel Input Profil Utama & Pimpinan Sekolah</h1>
            <p class="text-[10px] opacity-80">Pengisian Data Puncak Papan Struktur Organisasi</p>
        </div>
        <a href="index.html" class="bg-white text-gray-800 font-bold px-3 py-1.5 rounded hover:bg-gray-100 transition shadow">
            ⬅️ Kembali ke Dasbor
        </a>
    </header>

    <main class="container mx-auto px-2 py-4 max-w-2xl space-y-4">

        <div class="bg-white rounded-xl shadow p-5 border-t-4 border-gray-800">
            <h2 class="text-sm font-bold text-gray-800 mb-4">📝 Isikan Identitas Resmi & Unggah Foto Komando</h2>
            
            <form id="form-kasek" class="space-y-4">
                
                <div class="bg-gray-50 p-3 rounded border border-gray-200 space-y-3">
                    <span class="text-[10px] font-bold text-red-600 uppercase block">🏫 1. Profil Satuan Pendidikan</span>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Nama Resmi Sekolah (Gunakan Huruf Kapital)</label>
                        <input type="text" id="ins-nama-sekolah" required placeholder="Contoh: SDN 1 CIHERANG" class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                    </div>
                </div>

                <div class="bg-yellow-100/60 p-3 rounded border border-yellow-400 space-y-3">
                    <span class="text-[10px] font-bold text-yellow-800 uppercase block">🏆 2. Data Kepala Sekolah (Kasek)</span>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        <div>
                            <label class="block font-bold text-gray-700 mb-1">Nama Kepala Sekolah & Gelar</label>
                            <input type="text" id="ins-nama-kasek" required placeholder="Contoh: Drs. Mulyadi, M.Pd." class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                        </div>
                        <div>
                            <label class="block font-bold text-gray-700 mb-1">NIP Kepala Sekolah</label>
                            <input type="text" id="ins-nip-kasek" required placeholder="Contoh: 19740511..." class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                        </div>
                    </div>
                    <div>
                        <label class="block font-bold text-amber-900 mb-1">📸 Pas Foto Resmi Kepala Sekolah (Format Gambar)</label>
                        <input type="file" id="file-foto-kasek" accept="image/*" class="w-full text-xs">
                    </div>
                </div>

                <div class="bg-amber-50 p-3 rounded border border-amber-400 space-y-3">
                    <span class="text-[10px] font-bold text-amber-800 uppercase block">🤝 3. Data Ketua Komite Sekolah</span>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Nama Lengkap Ketua Komite</label>
                        <input type="text" id="ins-nama-komite" required placeholder="Contoh: Haji Kurdi, S.Pd." class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                    </div>
                    <div>
                        <label class="block font-bold text-amber-900 mb-1">📸 Pas Foto Resmi Ketua Komite Sekolah</label>
                        <input type="file" id="file-foto-komite" accept="image/*" class="w-full text-xs">
                    </div>
                </div>

                <div class="bg-sky-50 p-3 rounded border border-sky-300 grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="sm:col-span-2">
                        <span class="text-[10px] font-bold text-sky-800 uppercase block">💼 4. Sayap Administrasi & Kesiswaan</span>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Nama Kepala Tata Usaha (TU)</label>
                        <input type="text" id="ins-nama-tu" required placeholder="Isi '-' jika tidak ada" class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">Nama Urusan Kesiswaan / Guru BK</label>
                        <input type="text" id="ins-nama-bk" required placeholder="Isi '-' jika tidak ada" class="w-full p-2 border rounded text-xs outline-none focus:ring-2 focus:ring-gray-800">
                    </div>
                </div>

                <button type="submit" id="btn-save-kasek" class="w-full bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-3 rounded shadow-md transition">
                    💾 Simpan & Update Puncak Struktur Organisasi Sekolah
                </button>

            </form>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCCfF6fGPrZWMOVcVUIDzzcLC4dFEl9LBY",
          authDomain: "sekolah-4e62f.firebaseapp.com",
          projectId: "sekolah-4e62f",
          storageBucket: "sekolah-4e62f.firebasestorage.app",
          messagingSenderId: "1018984142264",
          appId: "1:1018984142264:web:e34fe5fd50766a6100ab4d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Mesin pengompres pas foto agar ukurannya pas masuk bingkai papan struktur sekolah
        function kompresMediaPimpinan(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // Standar ukuran pas foto pimpinan struktur (Lebar 140px, Tinggi 180px)
                        canvas.width = 140;
                        canvas.height = 180;
                        ctx.drawImage(img, 0, 0, 140, 180);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); // Rasio kompresi aman 80%
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        // Membaca data yang sudah tersimpan sebelumnya di server agar form tidak kosong saat dibuka kembali
        async function muatDataEksisting() {
            try {
                const docSnap = await getDoc(doc(db, "profil_sekolah", "identitas"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("ins-nama-sekolah").value = data.nama_sekolah || "";
                    document.getElementById("ins-nama-komite").value = data.nama_komite || "";
                    document.getElementById("ins-nama-kasek").value = data.nama_kasek || "";
                    document.getElementById("ins-nip-kasek").value = data.nip_kasek || "";
                    document.getElementById("ins-nama-tu").value = data.nama_tu || "";
                    document.getElementById("ins-nama-bk").value = data.nama_bk || "";
                }
            } catch (e) { console.error("Gagal menarik data awal:", e); }
        }

        // Proses Menyimpan Seluruh Data Administrasi Pimpinan Utama Sekolah
        document.getElementById("form-kasek").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-save-kasek");
            btn.innerText = "⏳ Sedang Memproses & Mengunggah Foto Ke Server...";
            btn.disabled = true;

            try {
                const fileFotoKasek = document.getElementById("file-foto-kasek").files[0];
                const fileFotoKomite = document.getElementById("file-foto-komite").files[0];
                
                let stringFotoKasek = "";
                let stringFotoKomite = "";

                // Tarik data lama terlebih dahulu agar jika user tidak mengganti foto, foto lama tidak terhapus
                const dokumenLama = await getDoc(doc(db, "profil_sekolah", "identitas"));
                if (dokumenLama.exists()) {
                    stringFotoKasek = dokumenLama.data().foto_kasek || "";
                    stringFotoKomite = dokumenLama.data().foto_komite || "";
                }

                // Jika ada file foto Kepala Sekolah baru yang dipilih
                if (fileFotoKasek) {
                    stringFotoKasek = await kompresMediaPimpinan(fileFotoKasek);
                }

                // Jika ada file foto Komite Sekolah baru yang dipilih
                if (fileFotoKomite) {
                    stringFotoKomite = await kompresMediaPimpinan(fileFotoKomite);
                }

                // Kirim paket data lengkap secara utuh ke database Firestore
                await setDoc(doc(db, "profil_sekolah", "identitas"), {
                    nama_sekolah: document.getElementById("ins-nama-sekolah").value.toUpperCase(),
                    nama_komite: document.getElementById("ins-nama-komite").value,
                    nama_kasek: document.getElementById("ins-nama-kasek").value,
                    nip_kasek: document.getElementById("ins-nip-kasek").value,
                    nama_tu: document.getElementById("ins-nama-tu").value,
                    nama_bk: document.getElementById("ins-nama-bk").value,
                    foto_kasek: stringFotoKasek,
                    foto_komite: stringFotoKomite
                });

                alert("🎉 Selamat Pak! Profil Sekolah, Kasek, & Komite Berhasil Diperbarui!");
            } catch (err) {
                alert("Mengalami kendala: " + err.message);
            } finally {
                btn.innerText = "💾 Simpan & Update Puncak Struktur Organisasi Sekolah";
                btn.disabled = false;
            }
        });

        // Jalankan perintah load otomatis ketika halaman terbuka sempurna
        window.onload = muatDataEksisting;
    </script>
</body>
</html>
